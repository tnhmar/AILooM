name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ---------------------------------------------------------------------------
  # Lock-file consistency gate
  # ---------------------------------------------------------------------------
  lock-check:
    name: Lock-file check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Regenerate uv.lock
        run: |
          rm -f uv.lock
          uv lock

      - name: Auto-commit uv.lock if changed (push only)
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(deps): regenerate uv.lock [skip ci]"
          file_pattern: uv.lock
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Verify uv.lock is up-to-date (PR only)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --exit-code uv.lock; then
            echo ''
            echo '::error::uv.lock is out of date. Run `uv lock` locally and commit the result.'
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: lock-check
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      # ruff is declared under [project.optional-dependencies] dev
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: ruff format check
        run: uv run ruff format --check src/ tests/

  # ---------------------------------------------------------------------------
  # Type-check
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    needs: lock-check
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      # mypy is declared under [project.optional-dependencies] dev
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: mypy strict
        run: uv run mypy src/ --strict --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Test (with coverage gate)
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lock-check
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      # pytest, pytest-asyncio, pytest-cov are declared under dev extra
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -m "not benchmark" \
            --cov=src/memory_layer \
            --cov-fail-under=90 \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Security scan
  # ---------------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: lock-check
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv and pip-audit
        run: pip install uv pip-audit

      # Export only production (non-dev, non-project) third-party packages.
      # The `chroma` extra is intentionally excluded: chromadb carries
      # CVE-2026-45829 (no upstream patch); it is not installed in production
      # images.  Suppression is tracked in .pip-audit-ignore.toml.
      - name: Export requirements
        run: |
          uv export \
            --format requirements-txt \
            --no-dev \
            --no-emit-project \
            > requirements.txt

      # --ignore-vuln suppresses CVE-2026-45829 for any chromadb entry that
      # may appear as a transitive dep. Primary mitigation is exclusion above.
      # Re-evaluate by 2026-09-19 (see .pip-audit-ignore.toml).
      - name: pip-audit
        run: |
          pip-audit \
            --requirement requirements.txt \
            --ignore-vuln CVE-2026-45829

      # Fail the build if any suppression in .pip-audit-ignore.toml has
      # passed its expiry date — forces periodic re-evaluation.
      - name: Check suppression expiry dates
        run: |
          python - <<'EOF'
          import sys, datetime
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib  # Python < 3.11 fallback

          with open(".pip-audit-ignore.toml", "rb") as f:
              data = tomllib.load(f)

          today = datetime.date.today()
          expired = []
          for entry in data.get("ignore", []):
              expiry = datetime.date.fromisoformat(entry["expires"])
              if today > expiry:
                  expired.append((entry["cve"], entry["expires"], entry["owner"]))

          if expired:
              for cve, exp, owner in expired:
                  print(f"::error::Suppression for {cve} expired on {exp}. Owner: {owner}. Re-evaluate and remove or extend.")
              sys.exit(1)
          else:
              print("All suppression entries are within their expiry window.")
          EOF

  # ---------------------------------------------------------------------------
  # Benchmark regression gate (main branch only)
  # ---------------------------------------------------------------------------
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: lock-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      # pytest and benchmark plugins are declared under dev extra
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run benchmark tests
        run: |
          uv run pytest tests/benchmarks/ -m benchmark -v \
            --json-report \
            --json-report-file=benchmark-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

  # ---------------------------------------------------------------------------
  # Docker build smoke test
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lock-check
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t memory-layer:ci .

      - name: Smoke test image
        run: |
          docker run --rm memory-layer:ci /app/.venv/bin/python -c \
            "from memory_layer.api.app import create_app; print('OK')"
