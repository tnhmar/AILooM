name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: ruff format check
        run: uv run ruff format --check src/ tests/

  # ---------------------------------------------------------------------------
  # Type-check
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: mypy strict
        run: uv run mypy src/ --strict --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Test (with coverage gate)
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -m "not benchmark" \
            --cov=src/memory_layer \
            --cov-fail-under=90 \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Security scan
  # ---------------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv and pip-audit
        run: |
          pip install uv pip-audit

      - name: Export requirements
        run: uv export --format requirements-txt --no-dev > requirements.txt

      - name: pip-audit
        run: pip-audit --requirement requirements.txt

  # ---------------------------------------------------------------------------
  # Benchmark regression gate (main branch only)
  # ---------------------------------------------------------------------------
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run benchmark tests
        run: |
          uv run pytest tests/benchmarks/ -m benchmark -v \
            --json-report \
            --json-report-file=benchmark-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

  # ---------------------------------------------------------------------------
  # Docker build smoke test
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t memory-layer:ci .

      - name: Smoke test image
        run: |
          docker run --rm memory-layer:ci /app/.venv/bin/python -c \
            "from memory_layer.api.app import create_app; print('OK')"
