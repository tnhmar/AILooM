version = 1
requires-python = ">=3.11"

[[package]]
name = "memory-layer"
version = "0.1.0"
source = { editable = "." }
dependencies = [
  { name = "aiosqlite" },
  { name = "chromadb" },
  { name = "fastapi" },
  { name = "httpx" },
  { name = "opentelemetry-api" },
  { name = "opentelemetry-sdk" },
  { name = "pydantic" },
  { name = "sqlalchemy" },
  { name = "typer" },
  { name = "uvicorn" },
]

[package.optional-dependencies]
dev = [
  { name = "httpx" },
  { name = "mypy" },
  { name = "pytest" },
  { name = "pytest-asyncio" },
  { name = "pytest-cov" },
  { name = "ruff" },
]
graph = [
  { name = "kuzu" },
  { name = "neo4j" },
]
langgraph = [
  { name = "langgraph" },
]
mcp = [
  { name = "mcp" },
]
postgres = [
  { name = "asyncpg" },
  { name = "psycopg", extra = ["binary"] },
]

[package.metadata]
requires-dist = [
  { name = "aiosqlite", specifier = ">=0.20" },
  { name = "chromadb", specifier = ">=0.5" },
  { name = "fastapi", specifier = ">=0.110" },
  { name = "httpx", specifier = ">=0.27" },
  { name = "kuzu", specifier = ">=0.4", marker = "extra == 'graph'" },
  { name = "langgraph", specifier = ">=0.2", marker = "extra == 'langgraph'" },
  { name = "mcp", specifier = ">=1.0", marker = "extra == 'mcp'" },
  { name = "mypy", specifier = ">=1.10", marker = "extra == 'dev'" },
  { name = "neo4j", specifier = ">=5", marker = "extra == 'graph'" },
  { name = "asyncpg", specifier = ">=0.29", marker = "extra == 'postgres'" },
  { name = "opentelemetry-api", specifier = ">=1.20" },
  { name = "opentelemetry-sdk", specifier = ">=1.20" },
  { name = "psycopg", extras = ["binary"], specifier = ">=3", marker = "extra == 'postgres'" },
  { name = "pydantic", specifier = ">=2" },
  { name = "pytest", specifier = ">=8", marker = "extra == 'dev'" },
  { name = "pytest-asyncio", specifier = ">=0.23", marker = "extra == 'dev'" },
  { name = "pytest-cov", specifier = ">=5", marker = "extra == 'dev'" },
  { name = "ruff", specifier = ">=0.4", marker = "extra == 'dev'" },
  { name = "sqlalchemy", specifier = ">=2" },
  { name = "typer", specifier = ">=0.12" },
  { name = "uvicorn", specifier = ">=0.29" },
  { name = "httpx", specifier = ">=0.27", marker = "extra == 'dev'" },
]
